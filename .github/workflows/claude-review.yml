name: Claude Code Review

on:
  # Interactive: responds to @claude mentions in PR/issue comments
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  # Manual trigger (restricted to repo write access)
  workflow_dispatch:
  # Automated review: only on PR open (not on every push)
  pull_request:
    types: [opened, reopened]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are reviewing a ROS 2 Python package for robotic data collection
            (rosbag recording, MinIO/S3 uploads, metadata management).
            The codebase uses rclpy, pytest, ruff, and uv.

            Review this PR. For each finding, explain the problem and suggest a fix.
            Prioritize by severity: bugs and security first, then reliability, then style.

            Focus on:
            - Correctness: logic errors, race conditions in ROS callbacks, resource leaks
            - Concurrency: thread safety with ROS executors, shared state synchronization
            - Security: hardcoded secrets, path traversal, unvalidated input
            - Test coverage gaps and brittle tests
            - ROS 2 and Python convention violations

            Skip nitpicks unless there are no substantive findings.
          claude_args: >-
            --model opus
            --allowedTools "Bash(git diff:*),Bash(git log:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment"
