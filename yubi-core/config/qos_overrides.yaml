# QoS overrides for topics that use BEST_EFFORT reliability
# Only needed when publisher uses BEST_EFFORT QoS (common for image streams)
#
# Without these overrides, ros2 bag record uses RELIABLE QoS by default,
# which cannot receive messages from BEST_EFFORT publishers.
#
# Add one entry per topic, e.g.:
#
# /camera/image_raw/compressed:
#   reliability: best_effort
#   durability: volatile
#   history: keep_last
#   depth: 10

/quest/controller/left/state:
  reliability: best_effort
  durability: volatile
  history: keep_last
  depth: 10

/quest/controller/right/state:
  reliability: best_effort
  durability: volatile
  history: keep_last
  depth: 10

/quest/hmd/state:
  reliability: best_effort
  durability: volatile
  history: keep_last
  depth: 10
