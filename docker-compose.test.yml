services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":19001"
    ports:
      - "19000:9000"
      - "19001:19001"
    environment:
      MINIO_ROOT_USER: testadmin
      MINIO_ROOT_PASSWORD: testadmin123
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 10

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 testadmin testadmin123 &&
      mc mb --ignore-existing local/test-gc-bucket &&
      exit 0
      "
